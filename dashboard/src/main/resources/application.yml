spring:
  application:
    name: dashboard
  profiles:
    active: local

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/dashboard
    driver-class-name: org.postgresql.Driver
    username: dashboard
    password: dashboard123
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://dashboard-db:5432/dashboard
    driver-class-name: org.postgresql.Driver
    username: dashboard
    password: dashboard123
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/dashboard
    driver-class-name: org.postgresql.Driver
    username: dashboard
    password: dashboard123
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

---
spring:
  config:
    activate:
      on-profile: local, docker, prod
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  address: 0.0.0.0

jwt:
  secret: dashbo4rd-s3cr3t-k3y-f0r-jwt-t0k3n-g3n3r@t10n-2024
  expiration: 86400000
