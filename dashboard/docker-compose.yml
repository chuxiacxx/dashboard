version: '3.8'

services:
  # PostgreSQL 数据库
  dashboard-db:
    image: postgres:16-alpine
    container_name: dashboard-db
    environment:
      POSTGRES_DB: dashboard
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: dashboard123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dashboard-network

  # 后端服务
  dashboard-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard-app
    depends_on:
      dashboard-db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - dashboard-network

  # 前端服务
  dashboard-web:
    build:
      context: ../dashboard-web
      dockerfile: Dockerfile
    container_name: dashboard-web
    depends_on:
      - dashboard-app
    ports:
      - "80:80"
    networks:
      - dashboard-network

volumes:
  postgres_data:

networks:
  dashboard-network:
    driver: bridge
